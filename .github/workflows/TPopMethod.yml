name: Cloud PC via Release-Hosted AweSun Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      # Integrated your direct release file download pathway cleanly
      RELEASE_URL: "https://github.com/tusharpop553-afk/OperaGX-RDP/releases/download/v1.0.0/AweSun.zip"

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Fetch Large Archive from Releases and Extract
        run: |
          Write-Host "Downloading large application payload from secure release tier..."
          Invoke-WebRequest -Uri "${{ env.RELEASE_URL }}" -OutFile "awesun.zip"
          
          Write-Host "Creating target system directories..."
          New-Item -ItemType Directory -Path "C:\Program Files (x86)\AweSun" -Force
          
          Write-Host "Extracting zip package archive..."
          Expand-Archive -Path "awesun.zip" -DestinationPath "C:\Program Files (x86)\AweSun" -Force
          
          # Automatically flattens the system structure if the zip contains a root folder name matching 'AweSun' or 'awesun'
          if (Test-Path "C:\Program Files (x86)\AweSun\AweSun") {
              Move-Item "C:\Program Files (x86)\AweSun\AweSun\*" "C:\Program Files (x86)\AweSun\" -Force
          } elseif (Test-Path "C:\Program Files (x86)\AweSun\awesun") {
              Move-Item "C:\Program Files (x86)\AweSun\awesun\*" "C:\Program Files (x86)\AweSun\" -Force
          }

      - name: Initialize Main Background Execution Engines
        run: |
          $AweSunExe = "C:\Program Files (x86)\AweSun\AweSun.exe"
          $ServiceExe = "C:\Program Files (x86)\AweSun\AweSunService.exe"
          
          if (-not (Test-Path $AweSunExe)) {
              Write-Error "CRITICAL: AweSun.exe not found at target location. Check your zip file configuration."
              exit 1
          }
          
          Write-Host "Registering background engine dependencies..."
          Start-Process $ServiceExe -ArgumentList "-install" -Wait -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          
          Write-Host "Launching main connection framework..."
          # Start the core engine headless with silent execution parameters
          Start-Process $AweSunExe -ArgumentList "-s" -NoNewWindow
          Start-Sleep -Seconds 10
          
          Write-Host "===================================================="
          Write-Host "         AWESUN ENGINE DEPLOYMENT COMPLETE          "
          Write-Host "===================================================="
          Write-Host " Large file download and deployment successful."
          Write-Host " Open your local computer or phone's AweSun client"
          Write-Host " to verify if this cloud runner pops up online."
          Write-Host "===================================================="

      - name: Keep Alive Loop
        run: Start-Sleep -Seconds 10000

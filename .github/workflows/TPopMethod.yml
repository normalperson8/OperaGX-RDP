name: Cloud PC via Release-Hosted AweSun (With GoFile ID Link)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RELEASE_URL: "https://github.com/tusharpop553-afk/OperaGX-RDP/releases/download/v1.0.0/AweSun.zip"

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Fetch Large Archive from Releases and Extract
        run: |
          Write-Host "Downloading application payload..."
          Invoke-WebRequest -Uri "${{ env.RELEASE_URL }}" -OutFile "awesun.zip"
          
          Write-Host "Extracting zip package directly to Program Files..."
          Expand-Archive -Path "awesun.zip" -DestinationPath "C:\Program Files (x86)" -Force

      - name: Initialize Main AweSun Desktop App
        run: |
          $AweSunExe = "C:\Program Files (x86)\AweSun\AweSun.exe"
          
          if (-not (Test-Path $AweSunExe)) {
              Write-Error "CRITICAL: AweSun.exe was not found at $AweSunExe."
              exit 1
          }
          
          Write-Host "Launching connection dashboard..."
          # Running it normally without "-s" to ensure the main interface opens up fully for the snapshot
          Start-Process $AweSunExe -NoNewWindow
          Write-Host "Waiting 25 seconds for window graphics and ID to render..."
          Start-Sleep -Seconds 25

      - name: Capture Desktop Screenshot
        run: |
          Write-Host "Capturing live virtual display matrix..."
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
          $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
          
          $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $bitmap.Size)
          $bitmap.Save("$pwd\awesun_display.png", [System.Drawing.Imaging.ImageFormat]::Png)
          
          $graphic.Dispose()
          $bitmap.Dispose()
          Write-Host "Screenshot saved locally to workspace."

      - name: Push Screenshot to GoFile API and Output View Link
        run: |
          Write-Host "Requesting optimized active upload server from GoFile..."
          try {
              $ServerCheck = Invoke-RestMethod -Uri "https://api.gofile.io/getServer" -Method Get
              $TargetServer = $ServerCheck.data.server
              Write-Host "Assigned GoFile Landing Target: $TargetServer"
              
              Write-Host "Uploading screenshot payload..."
              $UploadUri = "https://$TargetServer.gofile.io/uploadFile"
              
              # Execute multi-part form upload natively via PowerShell
              $Form = @{
                  file = Get-Item "$pwd\awesun_display.png"
              }
              $UploadResult = Invoke-RestMethod -Uri $UploadUri -Method Post -Form $Form
              
              $DownloadPage = $UploadResult.data.downloadPage
              
              Write-Host "`n===================================================="
              Write-Host "        AWESUN SCREENSHOT IS READY                  "
              Write-Host "===================================================="
              Write-Host " CLICK THIS LINK TO SEE YOUR ID & PASSCODE:"
              Write-Host " $DownloadPage"
              Write-Host "===================================================="
          }
          catch {
              Write-Error "GoFile API upload failed. Fallback to standard artifact compilation."
          }

      - name: Keep Alive Loop
        run: Start-Sleep -Seconds 10000

name: Cloud PC via Auto-Installing AweSun Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RELEASE_URL: "https://github.com/tusharpop553-afk/OperaGX-RDP/releases/download/v1.0.0/AweSun.zip"

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Fetch Large Archive from Releases and Extract Installer
        run: |
          Write-Host "Downloading application installer package..."
          Invoke-WebRequest -Uri "${{ env.RELEASE_URL }}" -OutFile "awesun.zip"
          
          Write-Host "Unpacking zip contents..."
          Expand-Archive -Path "awesun.zip" -DestinationPath "$env:TEMP\awesun_installer" -Force

      - name: Run Silent Background Automated Installation
        run: |
          # Locate the installer executable inside the unpacked folder dynamically
          $setupExe = Get-ChildItem -Path "$env:TEMP\awesun_installer" -Filter "*.exe" -Recurse | Select-Object -First 1
          
          if (-not $setupExe) {
              Write-Error "CRITICAL: No executable setup file found inside the uploaded zip archive."
              exit 1
          }
          
          Write-Host "Executing silent deployment via installer: $($setupExe.FullName)"
          # /S or /silent are standard deployment arguments to bypass the 'Install Now' popup window automatically
          Start-Process -FilePath $setupExe.FullName -ArgumentList "/S", "/silent", "/verysilent", "/qn" -Wait -ErrorAction SilentlyContinue
          
          Write-Host "Allowing system installation matrix 20 seconds to populate..."
          Start-Sleep -Seconds 20

      - name: Initialize Main Pre-Installed AweSun Dashboard
        run: |
          # Define standard default program installation pathways
          $path1 = "C:\Program Files (x86)\AweSun\AweSun.exe"
          $path2 = "C:\Program Files\AweSun\AweSun.exe"
          
          if (Test-Path $path1) { $AweSunExe = $path1 }
          elseif (Test-Path $path2) { $AweSunExe = $path2 }
          else {
              Write-Error "CRITICAL: AweSun did not install to standard paths. Printing Program Files directories for troubleshooting:"
              Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" -Filter "*AweSun*" -ErrorAction SilentlyContinue
              exit 1
          }
          
          Write-Host "Found installed application at: $AweSunExe"
          Write-Host "Launching connection framework interface..."
          Start-Process $AweSunExe -NoNewWindow
          Write-Host "Waiting 25 seconds for window rendering and credential mapping..."
          Start-Sleep -Seconds 25

      - name: Launch AweSun (foreground) + Screenshot to Gofile
        run: |
          Write-Host "Capturing active environment display matrices..."
          $screenshotPath = "$env:TEMP\awesun_display.png"
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose(); $bitmap.Dispose()

          Write-Host "Pushing screenshot configuration to GoFile network..."
          $curlResult = curl -F "file=@$screenshotPath" https://store1.gofile.io/uploadFile
          $json = $curlResult | ConvertFrom-Json
          if ($json.status -eq "ok") { 
              "SCREENSHOT_URL=$($json.data.downloadPage)" | Out-File -Append $env:GITHUB_ENV 
          }

      - name: Keep alive
        run: |
          $end = (Get-Date).AddMinutes(180)
          while ((Get-Date) -lt $end) {
            Write-Host ("AweSun Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " ends at " + $end.ToString("HH:mm:ss") + " | RS URL: $env:SCREENSHOT_URL")
            Start-Sleep -Seconds 60
          }
